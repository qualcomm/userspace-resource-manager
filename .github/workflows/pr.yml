name: Build URM

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  build:
    runs-on:
      group: GHA-CSEPerf-prd-SelfHosted-RG
      labels: [self-hosted, cseperf-prd-u2204-arm64-xlrg-od-ephem]

    env:
      URM_BINS_DIR: urm-bins                     # base dir name
      URM_INSTALL_PREFIX: ./urm-bins/            # used by CMake
      TAR_NAME: urm-bins.tar.gz                  # output tarball name

    steps:
      - name: Checkout URM image repo
        uses: actions/checkout@v5
        with:
          repository: qualcomm/urm-image

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build URM image (from Git URL) and load locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: urm-image:ci
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync codebase
        uses: qualcomm/userspace-resource-manager/.github/actions/sync@main
        with:
          event_name: ${{ github.event_name }}
          pr_ref: ${{ github.event.pull_request.head.ref }}
          pr_repo: ${{ github.event.pull_request.head.repo.full_name }}
          base_ref: ${{ github.ref_name }}

      - name: Debug + Build inside container
        run: |
          echo "========== HOST DEBUG =========="
          echo "PWD (host): $PWD"
          echo "Listing root:"
          ls -la
          echo "Find CMakeLists.txt on host:"
          find . -name CMakeLists.txt || true
      
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace \
            -e URM_BINS_DIR="${URM_BINS_DIR}" \
            -e URM_INSTALL_PREFIX="${URM_INSTALL_PREFIX}" \
            -e TAR_NAME="${TAR_NAME}" \
            urm-image:ci bash -lc '
              echo "========== CONTAINER DEBUG =========="
              echo "PWD (container): $(pwd)"
      
              echo "--- Environment ---"
              env | sort
      
              echo "--- Workspace listing ---"
              ls -la
      
              echo "--- Full tree (top 3 levels) ---"
              find . -maxdepth 3 -type d
      
              echo "--- Searching for CMakeLists.txt ---"
              find /workspace -name CMakeLists.txt || true
      
              echo "--- Checking expected paths ---"
              ls -la /workspace/userspace-resource-manager || true
      
              echo "--- Build step ---"
              mkdir -p build
              cd build
      
              echo "PWD before cmake: $(pwd)"
              echo "Listing parent dir:"
              ls -la ..
      
              echo "Running cmake"
              cmake .. -DBUILD_TESTS=ON -DBUILD_CLASSIFIER=ON \
                -DCMAKE_INSTALL_PREFIX="${URM_INSTALL_PREFIX}"
      
              echo "Running build"
              cmake --build .
      
              echo "Running install"
              make install
            '

      - name: Create a tar file of build
        run: |
          cd build
          tar -cjf "${{ github.workspace }}/${{ env.TAR_NAME }}" "${{ env.URM_BINS_DIR }}"
          cd "${{ github.workspace }}"
          touch file_list.txt
          echo "${{ github.workspace }}/${{ env.TAR_NAME }}" >> file_list.txt

      - name: Upload artifacts to S3
        uses: qualcomm/userspace-resource-manager/.github/actions/aws_s3_helper@main
        with:
          s3_bucket: qli-prd-cseperf-gh-artifacts
          mode: multi-upload
          local_file: file_list.txt
